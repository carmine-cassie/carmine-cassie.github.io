<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Payphone Fog</title>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.173.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.173.0/examples/jsm/"
        }
      }
    </script>
  </head>

  <body style="background-color: #aaaaaa">
    <script src="triangulation.js"></script>
    <script src="payphones.js"></script>
    <script src="past_captures.js"></script>
    <script src="shader.js" type="module" defer></script>

    <div
      id="home"
      style="
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
      "
    >
      <!-- (in Space Mono) -->
      <h1 style="margin: 2px">Payphone Fog of War</h1>
      <!-- (In either IMB Plex Mono or Courier New or monospace) -->
      <div style="display: flex; justify-content: center; gap: 5px">
        <p style="margin: 2px">
          Enter Operative Name:
          <!-- TODO implement this -->
        </p>
        <form style="display: inline" onsubmit="return false;">
          <input id="user_input" style="text-align: center" autocomplete="off" />
          <button
            type="submit"
            onclick="
              {
                const name = document.getElementById('user_input').value;

                const id = Object.keys(payphones['players']).find((key) => {
                  return (
                    payphones['players'][key]['name'].toLowerCase() ==
                    name.toLowerCase()
                  );
                });

                if (id == undefined) {
                  document.getElementById('err_text').style.display = 'block';
                } else {
                  window.location.href = `#${id}`;
                }
              }
            "
          >
            GO
          </button>
        </form>
      </div>
      <p
        id="err_text"
        style="color: red; margin: 2px; font-size: 0.9em; display: none"
      >
        Name not found!
      </p>
      <p style="margin: 2px; font-size: 0.9em">
        (Or just view
        <a href="#3209">my phones</a>.)
      </p>
      <div>
        <br />
        <br />
        <br />
        <br />
      </div>
    </div>

    <div id="map" style="display: none">
      <canvas
        id="bgcanvas"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%"
      ></canvas>
      <div
        style="
          background-color: grey;
          color: white;
          width: fit-content;
          position: fixed;
          margin: 0;
          padding: 5px;
        "
      >
        <p style="margin: 0">
          <span id="user"></span>: <span id="explored"></span>/<span
            id="total"
          ></span>
          explored
        </p>
      </div>
    </div>
  </body>
</html>
