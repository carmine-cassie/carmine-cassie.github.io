<html>
  <head>
    <meta charset="utf-8" />
    <title>New tab</title>

    <style>
      @font-face {
        font-family: 'kirsch';
        src: url('/assets/fonts/kirsch.ttf') format('truetype');
      }

      @font-face {
        font-family: 'OwreKynge';
        src: url('/assets/fonts/OwreKynge.ttf') format('opentype');
      }
      :root {
        background-color: #32302f;
        color: #ebdbb2;
        font-family: 'kirsch';
        font-size: 16px;
        text-align: center;

        --bg: #32302f;

        --day: #ebdbb2;
        --night: #1d2021;

        /* Neutral Versions */
        --outline: #d79921;
        --outline: #d65d0e;

        /* Bright versions */
        --golden: #fabd2f;
        --sun: #fe8019;

        --civil: #83a598;
        --nautical: #458588;
        --astronomical: #076678;
      }

      p {
        margin: 0;
      }

      button {
        font-family: 'kirsch';
        font-size: 16px;
        background-color: var(--bg);
        border: 1px solid var(--sun);
        color: var(--day);
        border-radius: 5px;
        cursor: pointer;
      }

      input {
        height: 16px;
        width: 4.5em;
        text-align: center;
        font-size: 16px;
        font-family: 'kirsch';
        background-color: var(--bg);
        border: 1px solid var(--sun);
        color: var(--day);
        margin: 5px;
      }
    </style>
  </head>
  <body
    style="
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 85vh;
      overflow: hidden;
    "
  >
    <h1
      id="time"
      style="
        font-size: 8em;
        font-weight: normal;
        font-family: 'OwreKynge';
        margin: 0;
        text-shadow: 4px 4px 0px #d65d0e;
      "
    >
      &nbsp;
    </h1>
    <p
      id="date"
      style="
        font-size: 3em;
        margin: 0;
        margin-top: -20px;
        text-shadow: 2px 2px 0px #d65d0e;
      "
    >
      &nbsp;
    </p>
    <div
      id="day"
      style="
        background-color: var(--night);
        height: 20px;
        width: 75vw;
        margin: 20px;
        border: 2px ridge #928374;
        border-radius: 10px;
        box-shadow: 0px 3px 3px var(--night);
      "
    >
      <div
        id="pointer"
        style="
          border: 2px inset #928374;
          box-sizing: border-box;
          position: relative;
          width: 20px;
          height: 20px;
          margin: 0px -10px;
          border-radius: 100%;
          text-align: center;
        "
      ></div>
    </div>

    <div
      style="
        position: fixed;
        bottom: 5px;
        right: 5px;
        border: 1px solid var(--day);
        background: var(--night);
        width: fit-content;
        border-radius: 5px;
        padding: 5px;
      "
    >
      <details>
        <summary style="cursor: pointer">Settings</summary>
        <p>Lat: <input id="lat-input" /></p>
        <p>Lon: <input id="lon-input" /></p>
        <button
          onclick="
            window.localStorage.setItem(
              'lat',
              document.getElementById('lat-input').value,
            );
            window.localStorage.setItem(
              'lon',
              document.getElementById('lon-input').value,
            );
            window.location.reload();
          "
        >
          Submit
        </button>
      </details>
    </div>
  </body>
</html>

<script type="module" defer>
  const date = new Date();
  const weekday = date.toLocaleDateString('en-au', { weekday: 'long' });
  const month = date.toLocaleDateString('en-au', { month: 'long' });
  const day = date.toLocaleDateString('en-au', { day: 'numeric' });
  document.getElementById('date').innerText = `${weekday}, ${month} ${day}`;

  const time = date.toLocaleTimeString('en-au', {
    hour: 'numeric',
    minute: '2-digit',
  });
  document.getElementById('time').innerText = time.replace(' ', '');

  import * as SunCalc from 'https://cdn.jsdelivr.net/npm/suncalc/+esm';

  // Load coords, with Sydney as as a default
  const lat = localStorage.getItem('lat') ?? -33.87;
  const lon = localStorage.getItem('lon') ?? 151.21;

  const sunTimes = SunCalc.getTimes(date, lat, lon);

  // TODO write date to percent function
  function dateToPercent(date) {
    const hour = +date.toLocaleTimeString('en-au', {
      hour12: false,
      hour: 'numeric',
    });
    const minute = +date.toLocaleTimeString('en-au', { minute: 'numeric' });
    const second = +date.toLocaleTimeString('en-au', { second: 'numeric' });

    const percent = (100 * (second + 60 * minute + 60 * 60 * hour)) / (60 * 60 * 24);
    return percent;
  }

  const delta = 0.01;
  const tickWidth = 0.25;
  let stops = [];

  function addStop(date, startColor, endColor) {
    if (date) {
      stops.push({ percent: dateToPercent(date) - delta, color: startColor });
      stops.push({ percent: dateToPercent(date) + delta, color: endColor });
    }
  }

  function addTick(date, tickColor, baseColor) {
    if (date) {
      stops.push({
        percent: dateToPercent(date) - tickWidth - delta,
        color: baseColor,
      });
      stops.push({
        percent: dateToPercent(date) - tickWidth + delta,
        color: tickColor,
      });
      stops.push({
        percent: dateToPercent(date) + tickWidth - delta,
        color: tickColor,
      });
      stops.push({
        percent: dateToPercent(date) + tickWidth + delta,
        color: baseColor,
      });
    }
  }

  addStop(sunTimes.nightEnd, 'night', 'astronomical');
  addStop(sunTimes.nauticalDawn, 'astronomical', 'nautical');
  addStop(sunTimes.dawn, 'nautical', 'civil');
  addStop(sunTimes.sunrise, 'civil', 'sun');
  // addStop(sunTimes.sunriseEnd, 'sun', 'golden');
  addStop(sunTimes.goldenHourEnd, 'golden', 'day');
  addStop(sunTimes.goldenHour, 'day', 'golden');
  // addStop(sunTimes.sunsetStart, 'golden', 'sun'  );
  addStop(sunTimes.sunset, 'sun', 'civil');
  addStop(sunTimes.dusk, 'civil', 'nautical');
  addStop(sunTimes.nauticalDusk, 'nautical', 'astronomical');
  addStop(sunTimes.night, 'astronomical', 'night');

  let lightestColour = 'night';
  if (sunTimes.goldenHourEnd) {
    lightestColour = 'day';
  } else if (sunTimes.sunriseEnd) {
    lightestColour = 'golden';
  } else if (sunTimes.sunrise) {
    lightestColour = 'sun';
  } else if (sunTimes.dawn) {
    lightestColour = 'civil';
  } else if (sunTimes.nauticalDawn) {
    lightestColour = 'nautical';
  } else if (sunTimes.nightEnd) {
    lightestColour = 'astronomical';
  }

  let darkestColour = 'day';
  if (sunTimes.night) {
    darkestColour = 'night';
  } else if (sunTimes.nauticalDusk) {
    darkestColour = 'astronomical';
  } else if (sunTimes.dusk) {
    darkestColour = 'nautical';
  } else if (sunTimes.sunset) {
    darkestColour = 'civil';
  } else if (sunTimes.sunsetStart) {
    darkestColour = 'sun';
  } else if (sunTimes.goldenHour) {
    darkestColour = 'golden';
  }

  addTick(sunTimes.solarNoon, 'sun', lightestColour);
  addTick(sunTimes.nadir, 'sun', darkestColour);

  stops.sort((a, b) => {
    return a['percent'] - b['percent'];
  });

  let gradient = 'linear-gradient(0.25turn';

  stops.forEach(({ percent, color }) => {
    gradient += `, var(--${color}) ${percent}%`;
  });

  gradient += ')';

  console.log(gradient);
  document.getElementById('day').style.backgroundImage = gradient;

  document.getElementById('pointer').style.left = `${dateToPercent(date)}%`;
</script>
